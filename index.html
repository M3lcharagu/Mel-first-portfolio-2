<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mel Charagu | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">MEL CHARAGU</div>
        <ul>
            <li>Services</li>
            <li>Projects</li>
            <li>Contact</li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Mel <br> Charagu</h1>
            <p>Fullstack Developer based in Kenya</p>
            <button class="cv-btn">DOWNLOAD CV</button>
        </div>
        
        <div class="hero-image-box">
            <img src="https://via.placeholder.com/400x300" alt="Work Setup">
        </div>
    </section>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
    //animation
    gsap.from(".logo", { duration: 1, y: -50, opacity: 0, ease: "power4.out" });
    gsap.from("h1", { duration: 1.5, x: -100, opacity: 0, delay: 0.5, ease: "power4.out" });
    gsap.from(".hero-image-container", { duration: 1.5, scale: 0.8, opacity: 0, delay: 0.8, ease: "expo.out" });
    gsap.from("nav ul li", { duration: 1, opacity: 0, y: -20, stagger: 0.2, delay: 1 });
</script>
</body>
</html>
